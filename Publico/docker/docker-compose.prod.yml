# docker-compose para levantar el frontend en la VM 10.43.97.237
# con Cloudflare Quick Tunnel (URL publica automatica, sin cuenta ni token).
#
# Uso:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Para ver la URL publica generada:
#   docker logs vote4tech-cloudflared

services:
  frontend:
    build:
      context: ..          # raiz del repo Vote4TechRegistraduriaFront
      dockerfile: Dockerfile
    image: vote4tech-publico:latest
    container_name: vote4tech-publico
    network_mode: host     # usa la red del VM directamente; permite que Nginx
                           # alcance IPs externas igual que el host (ej: 10.43.100.131)
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vote4tech-cloudflared
    command: tunnel --no-autoupdate --url http://localhost:80
    network_mode: host
    depends_on:
      - frontend
    restart: unless-stopped
