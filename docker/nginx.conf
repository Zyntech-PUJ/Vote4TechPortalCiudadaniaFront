server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # API GATEWAY: enruta /api/* al CiudadaniaBack (10.43.100.131:8084)
    # El prefijo /api/ se elimina antes de reenviar la peticion.
    # Ejemplo: GET /api/electoral/consulta-sancion?cedula=123
    #           -> http://10.43.100.131:8084/electoral/consulta-sancion?cedula=123
    # -------------------------------------------------------
    location /api/ {
        proxy_pass         http://10.43.100.131:8084/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Evita que el navegador reciba errores CORS: el backend
        # ve el origen del proxy (10.43.97.237), no el del browser.
        proxy_set_header   Origin            "";

        proxy_read_timeout  90s;
        proxy_connect_timeout 30s;
    }

    # -------------------------------------------------------
    # SPA ANGULAR: sirve los archivos estaticos y redirige
    # todas las rutas desconocidas al index.html (client-side routing)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresion gzip para assets estaticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
